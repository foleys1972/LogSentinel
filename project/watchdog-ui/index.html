<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogSentinel Watchdog</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1e293b;
      color: #e2e8f0;
      padding: 24px;
      min-height: 100vh;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 1.5rem;
      color: #f8fafc;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 0.875rem;
      margin-bottom: 24px;
    }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: #334155;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #64748b;
      flex-shrink: 0;
    }
    .status-dot.running { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
    .status-dot.stopped { background: #64748b; }
    .status-dot.restarting { background: #f59e0b; animation: pulse 1s infinite; }
    .status-dot.error { background: #ef4444; }
    @keyframes pulse { 50% { opacity: 0.5; } }
    .status-text {
      font-weight: 500;
      flex: 1;
    }
    .status-text.running { color: #22c55e; }
    .status-text.stopped { color: #94a3b8; }
    .status-text.restarting { color: #f59e0b; }
    .status-text.error { color: #ef4444; }
    .buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-start {
      background: #22c55e;
      color: white;
    }
    .btn-start:hover:not(:disabled) { background: #16a34a; }
    .btn-stop {
      background: #ef4444;
      color: white;
    }
    .btn-stop:hover:not(:disabled) { background: #dc2626; }
    .btn-restart {
      background: #f59e0b;
      color: white;
    }
    .btn-restart:hover:not(:disabled) { background: #d97706; }
    .btn-open {
      background: #3b82f6;
      color: white;
    }
    .btn-open:hover:not(:disabled) { background: #2563eb; }
    .log-section {
      flex: 1;
      min-height: 0;
    }
    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .log-header span { font-size: 0.875rem; color: #94a3b8; }
    .log-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px;
      height: 200px;
      overflow-y: auto;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #94a3b8;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>LogSentinel Watchdog</h1>
  <p class="subtitle">Place LogSentinel Enterprise Web.exe in the same folder. Start/Stop/Restart. Auto-restarts if it crashes. <a href="http://localhost:3000" target="_blank" style="color:#3b82f6">Dashboard</a></p>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Stopped</span>
  </div>

  <div class="buttons">
    <button class="btn-start" id="btnStart">Start</button>
    <button class="btn-stop" id="btnStop">Stop</button>
    <button class="btn-restart" id="btnRestart">Restart</button>
    <button class="btn-open" id="btnOpen">Open Dashboard</button>
  </div>

  <div class="log-section">
    <div class="log-header">
      <span>Log</span>
    </div>
    <div class="log-box" id="logBox"></div>
  </div>

  <script>
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const logBox = document.getElementById('logBox');
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const btnRestart = document.getElementById('btnRestart');
    const btnOpen = document.getElementById('btnOpen');
    function setStatus(status, msg) {
      statusDot.className = 'status-dot ' + status;
      const labels = {
        running: 'Running',
        stopped: 'Stopped',
        restarting: 'Restarting...',
        error: 'Error'
      };
      statusText.className = 'status-text ' + status;
      statusText.textContent = msg || labels[status] || status;

      btnStart.disabled = status === 'running';
      btnStop.disabled = status === 'stopped';
      btnRestart.disabled = status === 'restarting';
    }

    function appendLog(msg) {
      logBox.textContent += (logBox.textContent ? '\n' : '') + msg;
      logBox.scrollTop = logBox.scrollHeight;
    }

    window.watchdog.onStatus((status, msg) => {
      setStatus(status, msg);
    });

    window.watchdog.onLog((msg) => {
      appendLog(msg);
    });

    btnStart.addEventListener('click', async () => {
      await window.watchdog.start();
      setStatus('running');
      appendLog('Starting server...');
    });

    btnStop.addEventListener('click', async () => {
      await window.watchdog.stop();
      setStatus('stopped');
    });

    btnRestart.addEventListener('click', async () => {
      await window.watchdog.restart();
      setStatus('restarting');
    });

    btnOpen.addEventListener('click', () => {
      window.watchdog.openDashboard();
    });

    (async () => {
      const status = await window.watchdog.getStatus();
      setStatus(status);
      const logs = await window.watchdog.getLogs(30);
      if (logs) logBox.textContent = logs;
    })();
  </script>
</body>
</html>
